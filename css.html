<!DOCTYPE html>
<html lang="en">
<head>
   <style>
      *{
         padding: 0;
         margin: 0;
         font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
      body{
         background-color: rgb(183, 235, 235);
         text-align: center;
      }
      form{
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         gap: 20px;
         height: 100vh;
      }
      h2{
         font-size: 30px;
         text-decoration: underline solid rgb(10, 117, 117);
      }
      .form{
         background-color: rgb(85, 207, 207);
         padding: 50px;
         border-radius: 20px;
      }
      label{
         font-weight: 600;
      }
      input{
         border: none;
         border-radius: 25px;
         width: 90%;
         height: 20px;
      }
      .button{
         margin-top: 20px;
         max-width: 70px;
      }
   </style>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
</head>
<body>
   <form>
      <h2>Sign Up!</h2>
      <div class="form">
         <div class="username">
            <label>Username: </label>
            <input type="text" placeholder="" required>
         </div>
         <div class="email">
            <label>Email: </label>
            <input type="email" placeholder="" required>
         </div>
         <div class="password">
            <label>Password</label>
            <input type="password" placeholder="" required>
         </div>
         <div class="number">
            <label>Number</label>
            <input type="tel" placeholder="" required maxlength="10" minlength="10">
         </div>
         <div class="button">
            <button>Submit</button>
         </div>
      </div>
   </form>
</body>
</html>
